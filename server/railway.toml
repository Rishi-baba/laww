# ============================================================
# railway.toml — Express Server Deployment Configuration
# ============================================================

[build]
builder = "nixpacks"

[deploy]
# Explicit start command so Railway never falls back to `node index.js`
startCommand = "node server.js"

# Health check — Railway confirms the server is accepting connections
healthcheckPath = "/"
healthcheckTimeout = 60

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
