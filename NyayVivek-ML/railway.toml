# ============================================================
# railway.toml — Railway Deployment Configuration
# ============================================================
# Tells Railway to build using the Dockerfile in this repo
# and configures health check and restart policies.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand is intentionally omitted — the Dockerfile's shell-form CMD is used instead.
# Railway's startCommand override runs in exec form which does NOT expand $PORT.
# The Dockerfile CMD correctly uses shell form: uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}

# Health check — Railway pings /health to confirm the service is live
healthcheckPath = "/health"
healthcheckTimeout = 120     # seconds to wait for startup (model loading takes time)

# Restart policy on crash
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
